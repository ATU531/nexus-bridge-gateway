spring:
  application:
    name: nexus-bridge-gateway
  webflux:
    base-path: /api
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nexus.bridgegateway: DEBUG
    org.springframework.web: DEBUG
    org.web3j: DEBUG
    org.web3j.protocol: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

nexus:
  web3:
    chains:
      eth:
        rpc-url: https://cloudflare-eth.com
        symbol: ETH
      bsc:
        rpc-url: https://bsc-dataseed.binance.org/
        symbol: BNB
      polygon:
        rpc-url: https://polygon-rpc.com/
        symbol: MATIC
