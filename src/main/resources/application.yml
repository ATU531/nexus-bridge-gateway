spring:
  application:
    name: nexus-bridge-gateway
  cloud:
    gateway:
      routes:
        # 用户身份映射查询路由 - 通过 X-User-ID 查询余额
        - id: user_balance_by_id_route
          uri: forward:///internal/api/v1/user
          predicates:
            - Path=/api/v1/user/{chain}/balance
            - Method=GET
          filters:
            - SetPath=/internal/api/v1/user/{chain}/balance
        # 用户地址查询路由 - 通过钱包地址查询余额
        - id: user_balance_by_address_route
          uri: forward:///internal/api/v1/user
          predicates:
            - Path=/api/v1/user/{chain}/balance/{address}
            - Method=GET
          filters:
            - SetPath=/internal/api/v1/user/{chain}/balance/{address}
        # 最新区块号查询路由
        - id: user_block_latest_route
          uri: forward:///internal/api/v1/user
          predicates:
            - Path=/api/v1/user/{chain}/block/latest
            - Method=GET
          filters:
            - SetPath=/internal/api/v1/user/{chain}/block/latest
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/nexus_bridge?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.nexus.bridgegateway: DEBUG
    org.springframework.web: DEBUG
    org.web3j: DEBUG
    org.web3j.protocol: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

nexus:
  jwt:
    secret: a-very-secure-and-long-secret-key-for-nexus-bridge-gateway-2026
    expiration-ms: 86400000
  web3:
    chains:
      eth:
        rpc-url: https://rpc.ankr.com/eth/
        symbol: ETH
      bsc:
        rpc-url: https://bsc-dataseed.binance.org/
        symbol: BNB
      polygon:
        rpc-url: https://polygon-rpc.com/
        symbol: MATIC
